name: my_app
description: MY_APP UI
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 🍎 iOS-style icons
  cupertino_icons: ^1.0.6

  # 🎉 Confetti animation
  confetti: ^0.7.0

  # 💾 Local storage
  shared_preferences: ^2.2.3

  # 🔥 Firebase Core
  firebase_core: ^3.6.0

  # 🔐 Firebase Authentication
  firebase_auth: ^5.3.0

  # 🗄 Cloud Firestore
  cloud_firestore: ^5.5.0

  # 🖼 Firebase Storage (FOR PROFILE IMAGE)
  firebase_storage: ^12.3.0

  # 📷 Image Picker (FOR PROFILE IMAGE)
  image_picker: ^1.1.2

  # 🔔 Firebase Cloud Messaging
  firebase_messaging: ^15.2.10

  # 📱 Local notifications
  flutter_local_notifications: ^17.0.0

  # 🌍 Date formatting
  intl: ^0.18.1

  # ⏱ Time ago format
  timeago: ^3.6.1

  # 📡 RFID / NFC (LOCKED STABLE VERSION)
  nfc_manager: 3.3.0

  # 🌐 Open links
  url_launcher: ^6.2.0

  # 🔐 Google Sign-In
  google_sign_in: ^6.2.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/icon.png
  min_sdk_android: 21